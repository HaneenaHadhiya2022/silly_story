<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>One-Line Story Generator</title>
  <style>
    body {
      background-color: #f0f8ff;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      border: 2px solid #ccc;
      padding: 30px;
      max-width: 500px;
      text-align: center;
      border-radius: 15px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
    }

    h1 {
      color: #6a5acd;
    }

    #story {
      font-size: 1.3em;
      margin-top: 20px;
      color: #444;
    }

    button {
      background-color: #ffcccb;
      border: none;
      padding: 10px 20px;
      font-size: 1em;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background-color: #fca9a9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✨ Silly Story Generator</h1>
    <p id="story">Click below to see a new story!</p>
    <button id="generate">Generate Story</button>
  </div>

  <script>
    const stories = [
      "🛸 Aliens called Tom their snack-flavored hero.",
      "🐔 A chicken won the lottery and moved to Mars.",
      "🎩 A cat became mayor of a sleepy town in Italy.",
      "🍕 A pizza slice ran for president and almost won!",
      "🦄 A unicorn opened a donut shop on the moon.",
      "🤖 Robots had a dance-off in the Sahara Desert.",
      "🐙 An octopus invented bubble-powered shoes.",
      "🎻 A violin played itself at a ghost wedding.",
      "🍭 A lollipop solved a candy crime mystery.",
      "🐸 A frog opened a meditation center in Tokyo."
    ];

    document.getElementById('generate').addEventListener('click', () => {
      const randomIndex = Math.floor(Math.random() * stories.length);
      document.getElementById('story').textContent = stories[randomIndex];
    });
  </script>
</body>
</html>
